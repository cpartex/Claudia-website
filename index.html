<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dierenartsenpraktijk Claudia Gorissen</title>

<style>

:root{
--soft:#FDBCB4;
--accent:#FF6D2D;
--light:#c0d0e0;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Google Sans Flex",system-ui;
background:var(--light);
color:#333;
line-height:1.6;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:white;
display:flex;
justify-content:center;
gap:30px;
padding:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
z-index:100;
}

nav a{
text-decoration:none;
color:#333;
font-weight:500;
}

nav a:hover{
color:var(--accent);
}

/* HERO */

.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(var(--light),var(--soft));
padding:80px 20px;
}

.logo{
width:220px;
margin-bottom:20px;
}

.hero h1{
font-size:2rem;
margin-bottom:10px;
}

.hero p{
max-width:600px;
opacity:.8;
}

.buttons{
margin-top:30px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
background:var(--accent);
color:white;
padding:14px 26px;
border-radius:14px;
text-decoration:none;
font-weight:500;
transition:.25s;
}

.btn:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* SECTIONS */

section{
max-width:1000px;
margin:auto;
padding:80px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:white;
padding:30px;
border-radius:18px;
transition:.25s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.15);
background:var(--soft);
}

h2{
color:var(--accent);
margin-bottom:20px;
}

/* CONTACT */

.contact{
background:white;
border-radius:20px;
padding:40px;
}
